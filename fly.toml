app = "ollama-fastapi-railway"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DEFAULT_MODEL = "qwen2.5:0.5b"
  OLLAMA_HOST = "http://localhost:11434"
  # USE_SQLITE = "true"  # Uncomment to force SQLite instead of PostgreSQL
  # SQLITE_PATH = "/data/phoenix.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/health"

# PERSISTENT STORAGE - Create this volume once with:
# fly volumes create phoenix_data --region iad --size 3
# [[mounts]]
#   source = "phoenix_data"
#   destination = "/data"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
